<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" role="img" aria-label="qwen-companion — Qwen Code for Claude Code">
  <title>qwen-companion — Delegate rescues and code reviews to Qwen Code from inside Claude Code</title>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0B1F"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#0B1F1A"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#0FA968"/>
    </linearGradient>
    <linearGradient id="chip-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#0FA968"/>
    </linearGradient>
    <filter id="banner-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="300" fill="url(#bg-grad)"/>

  <!-- Subtle grid -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="75" x2="1200" y2="75"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
  </g>

  <!-- Accent bar left -->
  <rect x="0" y="0" width="6" height="300" fill="url(#accent-grad)"/>

  <!-- Logo chip on the left -->
  <g transform="translate(80, 70)">
    <rect x="0" y="0" width="160" height="160" rx="36" ry="36" fill="url(#chip-grad)"/>
    <rect x="4" y="4" width="152" height="152" rx="32" ry="32" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

    <!-- Stylized Q -->
    <circle cx="70" cy="75" r="36" fill="none" stroke="#ffffff" stroke-width="12" filter="url(#banner-glow)"/>

    <!-- Arrow tail -->
    <path d="M 92 97 L 128 133" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" filter="url(#banner-glow)"/>
    <path d="M 113 133 L 128 133 L 128 118" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#banner-glow)"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(280, 0)">
    <text x="0" y="130" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Inter, system-ui, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">
      qwen-companion
    </text>
    <text x="0" y="178" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Inter, system-ui, sans-serif" font-size="24" font-weight="500" fill="#ffffff" fill-opacity="0.82">
      Delegate rescues and code reviews to Qwen Code from inside Claude Code.
    </text>
    <text x="0" y="218" font-family="ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace" font-size="16" fill="#a78bfa" fill-opacity="0.85">
      /qwen:setup &#8226; /qwen:rescue &#8226; /qwen:review &#8226; /qwen:adversarial-review
    </text>
  </g>

  <!-- Stream dots bottom-right -->
  <g transform="translate(1080, 250)">
    <circle cx="0" cy="0" r="5" fill="#ffffff" fill-opacity="0.85"/>
    <circle cx="18" cy="0" r="5" fill="#ffffff" fill-opacity="0.6"/>
    <circle cx="36" cy="0" r="5" fill="#ffffff" fill-opacity="0.35"/>
    <circle cx="54" cy="0" r="5" fill="#ffffff" fill-opacity="0.15"/>
  </g>
</svg>
