<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="qwen-companion logo">
  <title>qwen-companion</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="50%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#0FA968"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square chip -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>

  <!-- Subtle inner border for depth -->
  <rect x="6" y="6" width="244" height="244" rx="50" ry="50" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Stylized Q: circle ring -->
  <circle cx="112" cy="120" r="58" fill="none" stroke="#ffffff" stroke-width="18" filter="url(#glow)"/>

  <!-- Q tail morphed into an arrow pointing down-right (handoff) -->
  <path d="M 148 156 L 206 214" stroke="#ffffff" stroke-width="18" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Arrowhead -->
  <path d="M 182 214 L 206 214 L 206 190" stroke="#ffffff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Three dots indicating "streaming output" / dialogue -->
  <circle cx="74" cy="210" r="6" fill="#ffffff" fill-opacity="0.85"/>
  <circle cx="96" cy="210" r="6" fill="#ffffff" fill-opacity="0.65"/>
  <circle cx="118" cy="210" r="6" fill="#ffffff" fill-opacity="0.45"/>
</svg>
